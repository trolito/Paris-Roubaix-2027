<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paris-Roubaix 2027</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #e31e24;
            --red-dark: #a0151b;
            --red-glow: rgba(227,30,36,0.25);
            --gold: #f5c518;
            --gold-light: #ffe580;
            --dark: #0f0f13;
            --dark2: #1a1a22;
            --dark3: #242432;
            --surface: #1e1e2a;
            --border: rgba(255,255,255,0.08);
            --text: #f0f0f5;
            --text-muted: #8888a0;
            --cobble: #6b5c4a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── HERO ── */
        .hero {
            position: relative;
            min-height: 340px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 60px 20px 50px;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 50% 0%, rgba(227,30,36,0.22) 0%, transparent 70%),
                linear-gradient(180deg, #0f0f13 0%, #1a1a22 100%);
        }
        .hero-cobble-strip {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 28px;
            background: repeating-linear-gradient(
                90deg,
                var(--cobble) 0px, var(--cobble) 22px,
                #5a4d3d 22px, #5a4d3d 26px
            );
            opacity: 0.55;
        }
        .hero-tag {
            position: relative;
            display: inline-block;
            background: var(--red);
            color: #fff;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            padding: 5px 14px;
            border-radius: 4px;
            margin-bottom: 18px;
        }
        .hero h1 {
            position: relative;
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(3.6rem, 10vw, 7rem);
            line-height: 0.9;
            letter-spacing: 2px;
            background: linear-gradient(160deg, #fff 30%, #d0cce0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }
        .hero h1 em {
            color: var(--red);
            -webkit-text-fill-color: var(--red);
            font-style: normal;
        }
        .hero-sub {
            position: relative;
            color: var(--text-muted);
            font-size: 1.05rem;
            font-weight: 500;
            letter-spacing: 0.04em;
        }
        .hero-badges {
            position: relative;
            display: flex;
            gap: 12px;
            margin-top: 22px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .badge {
            display: flex;
            align-items: center;
            gap: 7px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 100px;
            padding: 6px 16px;
            font-size: 0.82rem;
            font-weight: 600;
            color: #ccc;
        }
        .badge .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--red);
        }

        /* ── LAYOUT ── */
        .container {
            max-width: 980px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }

        /* ── SECTION HEADER ── */
        .section-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 44px 0 20px;
        }
        .section-header .sh-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--red), #ff5055);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
            box-shadow: 0 4px 16px var(--red-glow);
        }
        .section-header h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 1px;
            color: #fff;
        }
        .section-header .sh-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, rgba(255,255,255,0.1), transparent);
        }

        /* ── MAPS ── */
        .maps-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 8px;
        }
        @media (max-width: 700px) {
            .maps-grid { grid-template-columns: 1fr; }
        }
        .map-card {
            background: var(--surface);
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4);
        }
        .map-card-header {
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(90deg, rgba(227,30,36,0.15), transparent);
            border-bottom: 1px solid var(--border);
        }
        .map-card-header .mc-dot {
            width: 10px; height: 10px;
            background: var(--red);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--red);
        }
        .map-card-header h3 {
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #ddd;
        }
        .map-card svg {
            width: 100%;
            height: auto;
            display: block;
        }

        /* ── ITINERARY ── */
        .itinerary { display: flex; flex-direction: column; gap: 12px; }

        .day-card {
            background: var(--surface);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .day-header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 24px;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }
        .day-header:hover { background: rgba(255,255,255,0.03); }
        .day-number {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            color: var(--red);
            line-height: 1;
            min-width: 36px;
        }
        .day-info { flex: 1; }
        .day-info strong {
            display: block;
            font-size: 1.05rem;
            font-weight: 700;
            color: #fff;
        }
        .day-info span {
            font-size: 0.82rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        .day-toggle {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            transition: transform 0.35s ease, background 0.2s;
            flex-shrink: 0;
        }
        .day-card.active .day-toggle {
            transform: rotate(180deg);
            background: var(--red);
            color: #fff;
        }

        .day-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.45s cubic-bezier(0.4,0,0.2,1);
        }
        .day-card.active .day-body { max-height: 3000px; }

        .activity-list { padding: 4px 24px 20px; }
        .activity-item {
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .activity-item:last-child { border-bottom: none; }

        .act-main {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 12px 0;
            cursor: default;
        }
        .activity-item.expandable .act-main { cursor: pointer; }
        .activity-item.expandable .act-main:hover .act-desc { color: #eee; }

        .act-time {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--red);
            min-width: 52px;
            padding-top: 3px;
            letter-spacing: 0.03em;
            flex-shrink: 0;
        }
        .act-icon {
            font-size: 1.15rem;
            min-width: 26px;
            text-align: center;
            flex-shrink: 0;
        }
        .act-desc {
            font-size: 0.92rem;
            color: #ccc;
            line-height: 1.5;
            flex: 1;
            transition: color 0.15s;
        }
        .act-expand-btn {
            flex-shrink: 0;
            width: 22px; height: 22px;
            border-radius: 50%;
            background: rgba(255,255,255,0.07);
            border: none;
            color: var(--text-muted);
            font-size: 0.6rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: transform 0.3s ease, background 0.2s, color 0.2s;
            margin-top: 2px;
        }
        .activity-item.open .act-expand-btn {
            transform: rotate(90deg);
            background: var(--red);
            color: #fff;
        }

        .act-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1), padding 0.25s;
            padding: 0 0 0 94px;
        }
        .activity-item.open .act-details {
            max-height: 200px;
            padding: 0 0 12px 94px;
        }
        .act-details p {
            font-size: 0.83rem;
            color: var(--text-muted);
            line-height: 1.55;
            margin-bottom: 8px;
        }
        .act-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--red);
            text-decoration: none;
            border: 1px solid rgba(227,30,36,0.35);
            border-radius: 20px;
            padding: 3px 10px;
            transition: background 0.2s, color 0.2s;
        }
        .act-link:hover { background: var(--red); color: #fff; }

        .activity-item.g4c {
            background: linear-gradient(90deg, rgba(245,197,24,0.07), transparent);
            border-radius: 8px;
            padding: 0 12px;
            margin: 2px -12px;
            border-bottom: none;
            border-left: 3px solid var(--gold);
        }
        .activity-item.g4c .act-main { padding: 10px 0; }
        .activity-item.g4c .act-time { color: var(--gold); }
        .activity-item.g4c .act-desc { color: #e8d88a; }
        .activity-item.g4c .act-expand-btn { background: rgba(245,197,24,0.12); color: #a89030; }
        .activity-item.g4c.open .act-expand-btn { background: var(--gold); color: #1a1a00; }
        .activity-item.g4c .act-details { padding-left: 106px; }
        .activity-item.g4c.open .act-details { padding-bottom: 10px; }
        .activity-item.g4c .act-link { color: var(--gold); border-color: rgba(245,197,24,0.35); }
        .activity-item.g4c .act-link:hover { background: var(--gold); color: #1a1a00; }

        /* ── FOOTER ── */
        footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
            border-top: 1px solid var(--border);
        }
        footer strong { color: var(--red); }
    </style>
</head>
<body>

<div class="hero">
    <div class="hero-tag">April 9–12, 2027</div>
    <h1>Paris<em>-</em>Roubaix</h1>
    <p class="hero-sub">Kortrijk, Belgium &nbsp;·&nbsp; Cycling's Toughest Classic</p>
    <div class="hero-badges">
        <span class="badge"><span class="dot"></span>257 km of suffering</span>
        <span class="badge"><span class="dot"></span>Go4Cycling VIP Experience</span>
        <span class="badge"><span class="dot"></span>Roubaix Velodrome Finish</span>
    </div>
    <div class="hero-cobble-strip"></div>
</div>

<div class="container">

    <!-- MAPS SECTION -->
    <div class="section-header">
        <div class="sh-icon">🗺️</div>
        <h2>Route</h2>
        <div class="sh-line"></div>
    </div>

    <div class="maps-grid">

        <!-- TRAVEL ROUTE MAP -->
        <div class="map-card">
            <div class="map-card-header">
                <div class="mc-dot"></div>
                <h3>Travel Route</h3>
            </div>
            <svg viewBox="0 0 480 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Travel route map showing Copenhagen, Brussels, Ghent, Kortrijk, Roubaix and Compiègne">
                <defs>
                    <radialGradient id="seaGrad" cx="50%" cy="50%">
                        <stop offset="0%" stop-color="#2a4a7a"/>
                        <stop offset="100%" stop-color="#1a3055"/>
                    </radialGradient>
                    <radialGradient id="landGrad" cx="40%" cy="40%">
                        <stop offset="0%" stop-color="#3a6644"/>
                        <stop offset="100%" stop-color="#2c5236"/>
                    </radialGradient>
                    <filter id="glow">
                        <feGaussianBlur stdDeviation="3" result="blur"/>
                        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                    <filter id="shadow">
                        <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
                    </filter>
                    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
                        <path d="M0,0 L0,6 L8,3 z" fill="#e31e24"/>
                    </marker>
                    <marker id="arrowGold" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
                        <path d="M0,0 L0,6 L8,3 z" fill="#f5c518"/>
                    </marker>
                    <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse">
                        <circle cx="9" cy="9" r="1.5" fill="rgba(255,255,255,0.04)"/>
                    </pattern>
                </defs>

                <!-- Sea background -->
                <rect width="480" height="400" fill="url(#seaGrad)"/>
                <rect width="480" height="400" fill="url(#dots)"/>

                <!-- Wave lines -->
                <path d="M0,340 Q60,330 120,340 Q180,350 240,340 Q300,330 360,340 Q420,350 480,340" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1.5"/>
                <path d="M0,360 Q60,352 120,360 Q180,368 240,360 Q300,352 360,360 Q420,368 480,360" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1.5"/>

                <!-- Denmark landmass (stylized) -->
                <ellipse cx="340" cy="55" rx="52" ry="38" fill="url(#landGrad)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
                <!-- Danish peninsula detail -->
                <path d="M310,55 Q318,30 330,28 Q342,26 348,38 Q354,50 348,70 Q340,82 330,80 Q318,78 312,68 Z" fill="#2c5236" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
                <text x="340" y="50" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.35)" font-family="Inter,sans-serif" font-weight="600" letter-spacing="1">DENMARK</text>

                <!-- Main landmass: Belgium/France/Netherlands -->
                <path d="M30,160 Q60,130 110,128 Q160,126 200,140 Q240,154 280,148 Q310,144 340,152 Q370,160 390,185 Q410,210 400,250 Q390,280 370,300 Q340,325 300,335 Q240,345 180,340 Q130,335 90,320 Q50,305 30,280 Q10,255 20,215 Z" fill="url(#landGrad)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

                <!-- Country labels -->
                <text x="200" y="175" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.3)" font-family="Inter,sans-serif" font-weight="700" letter-spacing="2">BELGIUM</text>
                <text x="170" y="300" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.3)" font-family="Inter,sans-serif" font-weight="700" letter-spacing="2">FRANCE</text>

                <!-- Cobblestone texture hint near Roubaix area -->
                <g opacity="0.25">
                    <rect x="155" y="245" width="5" height="4" rx="1" fill="#8b7355"/>
                    <rect x="162" y="245" width="5" height="4" rx="1" fill="#8b7355"/>
                    <rect x="158" y="250" width="5" height="4" rx="1" fill="#8b7355"/>
                    <rect x="165" y="250" width="5" height="4" rx="1" fill="#8b7355"/>
                </g>

                <!-- FLIGHT PATH: Copenhagen → Brussels -->
                <path d="M340,70 Q280,80 210,155" fill="none" stroke="#e31e24" stroke-width="2" stroke-dasharray="6,5" marker-end="url(#arrowRed)" opacity="0.9"/>
                <!-- Plane icon along path -->
                <g transform="translate(275,100) rotate(-40)">
                    <text font-size="14" text-anchor="middle" dy="5">✈️</text>
                </g>

                <!-- GROUND ROUTE: Brussels→Ghent→Kortrijk→Roubaix→Compiègne -->
                <path d="M207,162 Q185,185 175,205 Q168,218 165,228 Q163,240 162,255 Q160,278 155,310" fill="none" stroke="#f5c518" stroke-width="2.5" stroke-dasharray="7,4" marker-end="url(#arrowGold)" opacity="0.85"/>

                <!-- CITY: Copenhagen -->
                <g transform="translate(340,72)" filter="url(#shadow)">
                    <circle r="13" fill="#e31e24" opacity="0.9"/>
                    <text text-anchor="middle" dy="5" font-size="13">🏙️</text>
                </g>
                <text x="340" y="100" text-anchor="middle" font-size="11" font-weight="800" fill="#fff" font-family="Inter,sans-serif">Copenhagen</text>
                <text x="340" y="112" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.5)" font-family="Inter,sans-serif">CPH ✈</text>

                <!-- CITY: Brussels -->
                <g transform="translate(207,162)" filter="url(#shadow)">
                    <circle r="11" fill="#4a7cc7" opacity="0.9"/>
                    <text text-anchor="middle" dy="5" font-size="12">🏛️</text>
                </g>
                <text x="207" y="185" text-anchor="middle" font-size="11" font-weight="800" fill="#fff" font-family="Inter,sans-serif">Brussels</text>
                <text x="207" y="196" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.5)" font-family="Inter,sans-serif">BRU ✈</text>

                <!-- CITY: Ghent -->
                <g transform="translate(175,210)" filter="url(#shadow)">
                    <circle r="11" fill="#4a7cc7" opacity="0.9"/>
                    <text text-anchor="middle" dy="5" font-size="12">🏰</text>
                </g>
                <text x="148" y="210" text-anchor="end" font-size="11" font-weight="800" fill="#fff" font-family="Inter,sans-serif">Ghent</text>

                <!-- CITY: Kortrijk (BASE) -->
                <g transform="translate(163,240)" filter="url(#shadow)">
                    <circle r="15" fill="#e31e24"/>
                    <circle r="15" fill="none" stroke="#fff" stroke-width="2"/>
                    <text text-anchor="middle" dy="5" font-size="14">🏨</text>
                </g>
                <text x="140" y="238" text-anchor="end" font-size="12" font-weight="900" fill="#fff" font-family="Inter,sans-serif">Kortrijk</text>
                <text x="140" y="250" text-anchor="end" font-size="9" fill="#f5c518" font-family="Inter,sans-serif">BASE CAMP</text>

                <!-- CITY: Roubaix -->
                <g transform="translate(162,270)" filter="url(#shadow)">
                    <circle r="12" fill="#2d9c4e" opacity="0.95"/>
                    <text text-anchor="middle" dy="5" font-size="13">🏟️</text>
                </g>
                <text x="140" y="270" text-anchor="end" font-size="11" font-weight="800" fill="#fff" font-family="Inter,sans-serif">Roubaix</text>
                <text x="140" y="281" text-anchor="end" font-size="9" fill="#66dd88" font-family="Inter,sans-serif">FINISH</text>

                <!-- CITY: Compiègne -->
                <g transform="translate(155,318)" filter="url(#shadow)">
                    <circle r="12" fill="#cc6600" opacity="0.95"/>
                    <text text-anchor="middle" dy="5" font-size="13">🚴</text>
                </g>
                <text x="140" y="316" text-anchor="end" font-size="11" font-weight="800" fill="#fff" font-family="Inter,sans-serif">Compiègne</text>
                <text x="140" y="327" text-anchor="end" font-size="9" fill="#ffaa55" font-family="Inter,sans-serif">START</text>

                <!-- Legend -->
                <rect x="295" y="280" width="170" height="90" rx="10" fill="rgba(0,0,0,0.45)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
                <line x1="310" y1="300" x2="340" y2="300" stroke="#e31e24" stroke-width="2" stroke-dasharray="5,3"/>
                <text x="348" y="304" font-size="10" fill="#ccc" font-family="Inter,sans-serif">Flight</text>
                <line x1="310" y1="318" x2="340" y2="318" stroke="#f5c518" stroke-width="2.5" stroke-dasharray="6,3"/>
                <text x="348" y="322" font-size="10" fill="#ccc" font-family="Inter,sans-serif">Ground route</text>
                <circle cx="316" cy="335" r="5" fill="#e31e24"/>
                <text x="327" y="339" font-size="10" fill="#ccc" font-family="Inter,sans-serif">Base camp</text>
                <circle cx="316" cy="352" r="5" fill="#2d9c4e"/>
                <text x="327" y="356" font-size="10" fill="#ccc" font-family="Inter,sans-serif">Race points</text>
            </svg>
        </div>

        <!-- RACE COURSE MAP -->
        <div class="map-card">
            <div class="map-card-header">
                <div class="mc-dot"></div>
                <h3>Paris-Roubaix 2027 Course</h3>
            </div>
            <svg viewBox="0 0 480 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Paris-Roubaix 2027 race course map from Compiègne to Roubaix with key cobbled sectors">
                <defs>
                    <linearGradient id="fieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#3d6b3a"/>
                        <stop offset="100%" stop-color="#2d5228"/>
                    </linearGradient>
                    <linearGradient id="fieldGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#4a7544"/>
                        <stop offset="100%" stop-color="#344f30"/>
                    </linearGradient>
                    <linearGradient id="roadGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#d4a843"/>
                        <stop offset="100%" stop-color="#b88a28"/>
                    </linearGradient>
                    <filter id="glow2">
                        <feGaussianBlur stdDeviation="3" result="blur"/>
                        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                    <filter id="shadow2">

<script>
    const dayNumbers = ['09', '10', '11', '12'];
    const dayColors  = ['#4a7cc7', '#4a7cc7', '#e31e24', '#4a7cc7'];
    const daySubtitles = ['Friday — April 9', 'Saturday — April 10', 'Sunday — April 11', 'Monday — April 12'];

    function buildActivity(a) {
        const hasDetails = a.details && a.details.trim();
        const item = document.createElement('div');
        item.className = 'activity-item' + (a.go4cycling ? ' g4c' : '') + (hasDetails ? ' expandable' : '');

        const mainRow = document.createElement('div');
        mainRow.className = 'act-main';
        mainRow.innerHTML =
            `<span class="act-time">${a.time}</span>` +
            `<span class="act-icon">${a.icon}</span>` +
            `<span class="act-desc">${a.description}</span>`;

        if (hasDetails) {
            const btn = document.createElement('button');
            btn.className = 'act-expand-btn';
            btn.setAttribute('aria-label', 'Show details');
            btn.textContent = '▶';
            mainRow.appendChild(btn);

            const details = document.createElement('div');
            details.className = 'act-details';
            details.innerHTML = `<p>${a.details}</p>` +
                (a.link ? `<a class="act-link" href="${a.link}" target="_blank" rel="noopener">Visit ↗</a>` : '');

            mainRow.addEventListener('click', () => item.classList.toggle('open'));
            item.appendChild(mainRow);
            item.appendChild(details);
        } else {
            item.appendChild(mainRow);
        }
        return item;
    }

    function renderItinerary(schedule) {
        const container = document.getElementById('itinerary');
        container.innerHTML = '';
        schedule.forEach((day, i) => {
            const card = document.createElement('div');
            card.className = 'day-card' + (i === 0 ? ' active' : '');

            const titleParts = day.title.split('–');
            const dayLabel = titleParts[1] ? titleParts[1].trim() : day.title;

            const header = document.createElement('div');
            header.className = 'day-header';
            header.innerHTML =
                `<div class="day-number" style="color:${dayColors[i]}">${dayNumbers[i]}</div>` +
                `<div class="day-info"><strong>${dayLabel}</strong><span>${daySubtitles[i]}</span></div>` +
                `<div class="day-toggle">▼</div>`;
            header.addEventListener('click', () => card.classList.toggle('active'));

            const body = document.createElement('div');
            body.className = 'day-body';
            const list = document.createElement('div');
            list.className = 'activity-list';
            day.activities.forEach(a => list.appendChild(buildActivity(a)));
            body.appendChild(list);

            card.appendChild(header);
            card.appendChild(body);
            container.appendChild(card);
        });
    }

    fetch('schedule.json')
        .then(r => r.json())
        .then(renderItinerary)
        .catch(err => {
            document.getElementById('itinerary').textContent = 'Could not load schedule. ' + err;
        });
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paris-Roubaix 2027 🇫🇷🚴‍♂️</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #e31e24;
            --primary-dark: #a0151b;
            --secondary: #ffd700;
            --background: #f0f2f5;
            --text: #2c2c2c;
            --text-light: #666;
            --card-bg: #ffffff;
            --border: #e0e0e0;
            --highlight: #f8f9fa;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            color: var(--text);
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 40px 0;
            position: relative;
        }
        header h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.8rem;
            color: var(--primary);
            margin-bottom: 10px;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.15);
            letter-spacing: 1px;
        }
        header p {
            font-size: 1.2rem;
            color: var(--text-light);
            font-weight: 500;
        }
        .section-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            color: var(--primary);
            margin: 30px 0 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary);
            display: inline-block;
        }
        .maps-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin: 20px 0 30px;
        }
        .map-wrapper {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            border: 1px solid rgba(227, 30, 36, 0.1);
        }
        .map-title {
            padding: 12px 20px;
            background: linear-gradient(90deg, var(--primary), #c9181e);
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            margin: 0;
        }
        .map-image {
            width: 100%;
            height: auto;
            display: block;
        }
        @media (min-width: 769px) {
            .maps-container {
                flex-direction: row;
            }
            .map-wrapper {
                flex: 1;
            }
        }
        .itinerary {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08);
            margin: 20px 0;
            overflow: hidden;
            border: 1px solid rgba(227, 30, 36, 0.1);
        }
        .day {
            border-bottom: 1px solid var(--border);
        }
        .day:last-child {
            border-bottom: none;
        }
        .day-header {
            background: linear-gradient(90deg, var(--primary), #c9181e);
            color: white;
            padding: 18px 24px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 1.2rem;
            transition: background 0.3s ease;
        }
        .day-header:hover {
            background: linear-gradient(90deg, var(--primary-dark), #8b1316);
        }
        .day-content {
            padding: 0;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out, padding 0.3s ease;
        }
        .day.active .day-content {
            max-height: 2000px;
            padding: 20px;
            background: var(--highlight);
        }
        .day-content ul {
            list-style: none;
        }
        .day-content li {
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: flex-start;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .day-content li:hover {
            transform: translateX(4px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        .day-content li:last-child {
            border-bottom: none;
        }
        .time {
            font-weight: 700;
            color: var(--primary);
            min-width: 90px;
            margin-right: 15px;
            font-size: 0.95rem;
        }
        .activity {
            flex: 1;
            font-size: 1rem;
        }
        .activity.go4cycling {
            background: linear-gradient(90deg, rgba(255, 215, 0, 0.12), transparent);
            border-left: 4px solid var(--secondary);
            padding-left: 12px;
            margin-left: -12px;
        }
        .icon {
            margin-right: 10px;
            font-size: 1.3rem;
        }
        .go4cycling .icon {
            color: var(--secondary);
        }
        .toggle-icon {
            transition: transform 0.4s ease;
            font-size: 1.2rem;
        }
        .day.active .toggle-icon {
            transform: rotate(180deg);
        }
        @media (max-width: 768px) {
            header h1 {
                font-size: 2.8rem;
            }
            header p {
                font-size: 1.1rem;
            }
            .container {
                padding: 10px;
            }
            .day-header {
                padding: 14px 18px;
                font-size: 1.1rem;
            }
            .time {
                min-width: 70px;
                font-size: 0.9rem;
            }
            .activity {
                font-size: 0.95rem;
            }
        }
        .footer {
            text-align: center;
            padding: 30px;
            color: var(--text-light);
            font-size: 1rem;
            font-weight: 500;
        }
        .footer-icon {
            margin: 0 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Paris-Roubaix 2027</h1>
            <p>April 9–12, 2027 | Kortrijk & Ghent, Belgium</p>
        </header>
        
        <h2 class="section-title">🗺️ Route</h2>
        <div class="maps-container">
            <div class="map-wrapper">
                <h3 class="map-title">Travel Route: Key Locations</h3>
                <img class="map-image" src="travel_route_map.png" alt="Cartoonish tourist map showing Brussels, Kortrijk, Compiègne, and Roubaix">
            </div>
            <div class="map-wrapper">
                <h3 class="map-title">Paris-Roubaix Course 2027</h3>
                <img class="map-image" src="course_map.png" alt="Cartoonish tourist map of the Paris-Roubaix course with start, finish, and key sectors">
            </div>
        </div>
        
        <h2 class="section-title">⏳ Itinerary</h2>
        <div class="itinerary" id="itinerary"></div>
        
        <div class="footer">
            <p>
                <span>Enjoy Paris-Roubaix 2027!</span>
                <span class="footer-icon">🇫🇷</span>
                <span>Cycling's Toughest Classic</span>
                <span class="footer-icon">🚴‍♂️</span>
            </p>
        </div>
    </div>
    
    <script src="schedule.js"></script>
    <script>
        function toggleDay(element) {
            const day = element.parentElement;
            day.classList.toggle('active');
        }
        
        function renderItinerary() {
            const itineraryContainer = document.getElementById('itinerary');
            itineraryContainer.innerHTML = '';
            
            schedule.forEach(day => {
                const dayElement = document.createElement('div');
                dayElement.className = 'day';
                
                const dayHeader = document.createElement('div');
                dayHeader.className = 'day-header';
                dayHeader.onclick = function() { toggleDay(this); };
                dayHeader.innerHTML = `
                    <span>${day.title}</span>
                    <span class="toggle-icon">▼</span>
                `;
                
                const dayContent = document.createElement('div');
                dayContent.className = 'day-content';
                
                const activityList = document.createElement('ul');
                day.activities.forEach(activity => {
                    const li = document.createElement('li');
                    const go4cyclingClass = activity.go4cycling ? 'go4cycling' : '';
                    li.innerHTML = `
                        <span class="time">${activity.time}</span>
                        <span class="activity ${go4cyclingClass}">
                            <span class="icon">${activity.icon}</span>
                            ${activity.description}
                        </span>
                    `;
                    activityList.appendChild(li);
                });
                
                dayContent.appendChild(activityList);
                dayElement.appendChild(dayHeader);
                dayElement.appendChild(dayContent);
                itineraryContainer.appendChild(dayElement);
            });
            
            // Open all days by default
            document.querySelectorAll('.day').forEach(day => day.classList.add('active'));
        }
        
        // Render the itinerary when the page loads
        document.addEventListener('DOMContentLoaded', renderItinerary);
    </script>
</body>
</html>
